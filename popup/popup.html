<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      width: 320px;
      background: #f8f9fb;
      color: #111827;
    }

    /* ── Header ──────────────────────────────────────────── */
    .popup-header {
      background: #0e0e14;
      padding: 11px 14px;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .popup-logo { color: #7c3aed; font-size: 14px; line-height: 1; }
    .popup-title {
      font-size: 12.5px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.03em;
    }

    /* ── Body ────────────────────────────────────────────── */
    .popup-body {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .section-label {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #9ca3af;
      margin-bottom: 7px;
    }

    /* ── API key ─────────────────────────────────────────── */
    .key-status {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 10px;
      border-radius: 8px;
      margin-bottom: 7px;
      font-size: 12px;
      border: 1px solid transparent;
      transition: background 0.15s, border-color 0.15s;
    }
    .key-status.ok     { background: #f0fdf4; border-color: #a7f3d0; color: #065f46; }
    .key-status.missing { background: #fffbeb; border-color: #fde68a; color: #92400e; }

    .key-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .key-dot.ok      { background: #10b981; }
    .key-dot.missing { background: #f59e0b; }

    input[type="password"] {
      width: 100%;
      padding: 8px 10px;
      background: #fff;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      color: #111827;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input[type="password"]:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.08);
    }
    input[type="password"]::placeholder { color: #d1d5db; }

    /* ── Creator type cards ──────────────────────────────── */
    .creator-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
    }

    .creator-card {
      padding: 8px 10px;
      background: #fff;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      transition: border-color 0.12s, background 0.12s;
    }
    .creator-card:hover { border-color: #c4b5fd; background: #faf5ff; }
    .creator-card.active { border-color: #7c3aed; background: #f5f3ff; }
    .creator-card.wide { grid-column: span 2; }

    .card-name {
      font-size: 12px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 1px;
    }
    .creator-card.active .card-name { color: #5b21b6; }

    .card-desc {
      font-size: 10px;
      color: #9ca3af;
      line-height: 1.3;
    }
    .creator-card.active .card-desc { color: #7c3aed; }

    /* ── Actions ─────────────────────────────────────────── */
    .btn-row {
      display: flex;
      gap: 7px;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, opacity 0.15s;
    }
    button:disabled { opacity: 0.55; cursor: default; }

    #save {
      flex: 1;
      background: #7c3aed;
      color: #fff;
    }
    #save:not(:disabled):hover { background: #6d28d9; }

    #test {
      background: #fff;
      color: #374151;
      border: 1.5px solid #e5e7eb;
    }
    #test:not(:disabled):hover { background: #f3f4f6; }

    /* ── Status ──────────────────────────────────────────── */
    #status {
      font-size: 11.5px;
      min-height: 15px;
      text-align: center;
      transition: color 0.15s;
    }
    #status.ok    { color: #059669; }
    #status.error { color: #dc2626; }
    #status.info  { color: #6b7280; }
  </style>
</head>
<body>

  <div class="popup-header">
    <span class="popup-logo">✦</span>
    <span class="popup-title">OF Chatter Assistant</span>
  </div>

  <div class="popup-body">

    <!-- API key -->
    <div>
      <div class="section-label">Anthropic API Key</div>
      <div id="keyStatus" class="key-status missing">
        <div id="keyDot" class="key-dot missing"></div>
        <span id="keyStatusText">No key saved</span>
      </div>
      <input type="password" id="apiKey" placeholder="sk-ant-…" autocomplete="off">
    </div>

    <!-- Creator type -->
    <div>
      <div class="section-label">Creator type</div>
      <div class="creator-grid" id="creatorGrid">
        <button class="creator-card" data-value="woman">
          <div class="card-name">Woman</div>
          <div class="card-desc">Warm, flirty, confident</div>
        </button>
        <button class="creator-card" data-value="egirl">
          <div class="card-name">E-girl</div>
          <div class="card-desc">Playful, teasing, emoji-heavy</div>
        </button>
        <button class="creator-card" data-value="mature_woman">
          <div class="card-name">Mature woman</div>
          <div class="card-desc">Experienced, nurturing</div>
        </button>
        <button class="creator-card" data-value="man">
          <div class="card-name">Man</div>
          <div class="card-desc">Direct, gym, confident</div>
        </button>
        <button class="creator-card" data-value="picture_only">
          <div class="card-name">Picture only</div>
          <div class="card-desc">Photo sets, visual language</div>
        </button>
        <button class="creator-card" data-value="video_creator">
          <div class="card-name">Video creator</div>
          <div class="card-desc">Clips, motion, custom</div>
        </button>
        <button class="creator-card wide" data-value="couple">
          <div class="card-name">Couple</div>
          <div class="card-desc">"We" language, voyeuristic angle</div>
        </button>
      </div>
    </div>

    <!-- Actions -->
    <div class="btn-row">
      <button id="test">Test API</button>
      <button id="save">Save settings</button>
    </div>
    <div id="status"></div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
