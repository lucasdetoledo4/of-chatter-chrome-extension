<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      width: 280px;
      padding: 16px;
      background: #111;
      color: #eee;
    }
    h1 { font-size: 14px; font-weight: 600; margin-bottom: 14px; color: #fff; }
    label { display: block; margin-bottom: 5px; color: #aaa; font-size: 12px; }
    input {
      width: 100%;
      padding: 7px 10px;
      background: #222;
      border: 1px solid #333;
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
      outline: none;
    }
    input:focus { border-color: #555; }
    button {
      margin-top: 10px;
      width: 100%;
      padding: 8px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #6ee7b7;
      min-height: 16px;
    }
    #status.error { color: #f87171; }
  </style>
</head>
<body>
  <h1>OF Chatter Assistant</h1>
  <label for="apiKey">Anthropic API Key</label>
  <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off">
  <button id="save">Save</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
