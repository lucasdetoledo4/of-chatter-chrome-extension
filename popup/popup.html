<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 320px;
      background: #e2e8f0;
      color: #0f172a;
      padding: 8px;
    }

    .popup-card {
      background: #f8fafc;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #cbd5e1;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
    }

    /* ── Header ──────────────────────────────────────────── */
    .header {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-box {
      width: 36px;
      height: 36px;
      background: #e2e8f0;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #475569;
      font-size: 17px;
      flex-shrink: 0;
    }

    .app-name {
      font-size: 15px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -0.01em;
    }

    .app-sub {
      font-size: 11.5px;
      color: #94a3b8;
      margin-top: 2px;
    }

    /* ── Body ────────────────────────────────────────────── */
    .body {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Section labels ──────────────────────────────────── */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    /* ── Creator list ────────────────────────────────────── */
    .creator-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .creator-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.12s;
      border: 1.5px solid transparent;
    }

    .creator-row:hover { background: #f1f5f9; }

    .creator-row.active {
      background: rgba(124, 58, 237, 0.06);
      border-color: rgba(124, 58, 237, 0.18);
    }

    .creator-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #cbd5e1;
    }

    .creator-dot.active { background: #7c3aed; }

    .creator-name {
      font-size: 13px;
      font-weight: 500;
      color: #334155;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .creator-row.active .creator-name { color: #7c3aed; font-weight: 600; }

    .creator-type-badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #94a3b8;
      text-transform: capitalize;
      flex-shrink: 0;
    }

    .creator-delete {
      background: none;
      border: none;
      color: #cbd5e1;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      font-size: 14px;
      line-height: 1;
      height: auto;
      flex-shrink: 0;
      transition: color 0.12s, background 0.12s;
    }

    .creator-delete:hover:not(:disabled) { color: #ef4444; background: #fee2e2; }
    .creator-delete:disabled { opacity: 0.3; cursor: default; }

    /* ── Add creator button ───────────────────────────────── */
    .add-creator-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      background: none;
      border: 1.5px dashed #cbd5e1;
      border-radius: 8px;
      color: #94a3b8;
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      height: auto;
      margin-top: 4px;
      transition: border-color 0.12s, color 0.12s, background 0.12s;
      font-family: inherit;
    }

    .add-creator-btn:hover {
      border-color: #7c3aed;
      color: #7c3aed;
      background: rgba(124, 58, 237, 0.04);
    }

    /* ── Edit fields ─────────────────────────────────────── */
    .field { display: flex; flex-direction: column; gap: 7px; }

    .field-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .field-row label {
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
      min-width: 44px;
      flex-shrink: 0;
    }

    label {
      font-size: 12.5px;
      font-weight: 600;
      color: #475569;
    }

    /* ── Key status pill ─────────────────────────────────── */
    .key-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      border: 1.5px solid transparent;
    }
    .key-pill.ok      { background: #f0fdf4; border-color: #bbf7d0; color: #166534; }
    .key-pill.missing { background: #fefce8; border-color: #fde68a; color: #854d0e; }

    .key-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .key-dot.ok      { background: #22c55e; }
    .key-dot.missing { background: #eab308; }

    /* ── Text inputs ─────────────────────────────────────── */
    input[type="password"],
    input[type="text"],
    select {
      width: 100%;
      height: 38px;
      padding: 0 11px;
      background: #fff;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      color: #0f172a;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input[type="password"]:focus,
    input[type="text"]:focus,
    select:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.12);
    }

    input[type="password"]::placeholder,
    input[type="text"]::placeholder { color: #cbd5e1; }

    /* ── Divider ─────────────────────────────────────────── */
    .sep {
      height: 1px;
      background: #e2e8f0;
    }

    /* ── Buttons ─────────────────────────────────────────── */
    .btn-row {
      display: flex;
      gap: 8px;
    }

    button {
      height: 42px;
      padding: 0 16px;
      border-radius: 9px;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      border: none;
      transition: background 0.14s, box-shadow 0.14s, opacity 0.14s;
    }
    button:disabled { opacity: 0.45; cursor: default; }

    #save {
      flex: 1;
      background: #7c3aed;
      color: #fff;
    }
    #save:not(:disabled):hover {
      background: #6d28d9;
      box-shadow: 0 2px 10px rgba(109, 40, 217, 0.3);
    }

    #test {
      background: #fff;
      color: #475569;
      border: 1.5px solid #e2e8f0;
    }
    #test:not(:disabled):hover { background: #f1f5f9; }

    /* ── Status ──────────────────────────────────────────── */
    #status {
      font-size: 13px;
      font-weight: 500;
      min-height: 18px;
      text-align: center;
    }
    #status.ok    { color: #16a34a; }
    #status.error { color: #dc2626; }
    #status.info  { color: #64748b; }
  </style>
</head>
<body>

<div class="popup-card">

  <div class="header">
    <div class="logo-box">✦</div>
    <div>
      <div class="app-name">OF Chatter</div>
      <div class="app-sub">AI reply assistant</div>
    </div>
  </div>

  <div class="body">

    <!-- Creators section -->
    <div class="field">
      <div class="section-label">Creators</div>
      <div class="creator-list" id="creatorList"></div>
      <button class="add-creator-btn" id="addCreator">+ Add creator</button>
    </div>

    <div class="sep"></div>

    <!-- Edit active creator -->
    <div class="field" id="editSection">
      <div class="field-row">
        <label for="creatorName">Name</label>
        <input type="text" id="creatorName" placeholder="e.g. Sofia" autocomplete="off">
      </div>
      <div class="field-row">
        <label for="creatorType">Type</label>
        <select id="creatorType">
          <option value="woman">Woman</option>
          <option value="egirl">E-girl</option>
          <option value="mature_woman">Mature woman</option>
          <option value="man">Man</option>
          <option value="picture_only">Picture only</option>
          <option value="video_creator">Video creator</option>
          <option value="couple">Couple</option>
        </select>
      </div>
    </div>

    <div class="sep"></div>

    <!-- API key -->
    <div class="field">
      <label for="apiKey">Anthropic API Key</label>
      <div id="keyStatus" class="key-pill missing">
        <div id="keyDot" class="key-dot missing"></div>
        <span id="keyStatusText">No key saved</span>
      </div>
      <input type="password" id="apiKey" placeholder="sk-ant-…" autocomplete="off">
    </div>

    <div class="sep"></div>

    <!-- Actions -->
    <div class="field">
      <div class="btn-row">
        <button id="test">Test API</button>
        <button id="save">Save</button>
      </div>
      <div id="status" style="margin-top:10px;"></div>
    </div>

  </div>

</div><!-- /.popup-card -->

  <script src="popup.js"></script>
</body>
</html>
