<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 300px;
      background: #f8fafc;
      color: #0f172a;
    }

    /* ── Header ──────────────────────────────────────────── */
    .header {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-box {
      width: 36px;
      height: 36px;
      background: #7c3aed;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 17px;
      flex-shrink: 0;
    }

    .app-name {
      font-size: 15px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -0.01em;
    }

    .app-sub {
      font-size: 11.5px;
      color: #94a3b8;
      margin-top: 2px;
    }

    /* ── Body ────────────────────────────────────────────── */
    .body {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Field ───────────────────────────────────────────── */
    .field { display: flex; flex-direction: column; gap: 7px; }

    label {
      font-size: 12.5px;
      font-weight: 600;
      color: #475569;
    }

    /* ── Key status pill ─────────────────────────────────── */
    .key-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      border: 1.5px solid transparent;
    }
    .key-pill.ok      { background: #f0fdf4; border-color: #bbf7d0; color: #166534; }
    .key-pill.missing { background: #fefce8; border-color: #fde68a; color: #854d0e; }

    .key-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .key-dot.ok      { background: #22c55e; }
    .key-dot.missing { background: #eab308; }

    /* ── Text inputs ─────────────────────────────────────── */
    input[type="password"],
    select {
      width: 100%;
      height: 42px;
      padding: 0 13px;
      background: #fff;
      border: 1.5px solid #e2e8f0;
      border-radius: 9px;
      font-size: 14px;
      font-family: inherit;
      color: #0f172a;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input[type="password"]:focus,
    select:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.12);
    }

    input[type="password"]::placeholder { color: #cbd5e1; }

    /* ── Divider ─────────────────────────────────────────── */
    .sep {
      height: 1px;
      background: #e2e8f0;
    }

    /* ── Buttons ─────────────────────────────────────────── */
    .btn-row {
      display: flex;
      gap: 8px;
    }

    button {
      height: 42px;
      padding: 0 16px;
      border-radius: 9px;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      border: none;
      transition: background 0.14s, box-shadow 0.14s, opacity 0.14s;
    }
    button:disabled { opacity: 0.45; cursor: default; }

    #save {
      flex: 1;
      background: #7c3aed;
      color: #fff;
    }
    #save:not(:disabled):hover {
      background: #6d28d9;
      box-shadow: 0 2px 10px rgba(109, 40, 217, 0.3);
    }

    #test {
      background: #fff;
      color: #475569;
      border: 1.5px solid #e2e8f0;
    }
    #test:not(:disabled):hover { background: #f1f5f9; }

    /* ── Status ──────────────────────────────────────────── */
    #status {
      font-size: 13px;
      font-weight: 500;
      min-height: 18px;
      text-align: center;
    }
    #status.ok    { color: #16a34a; }
    #status.error { color: #dc2626; }
    #status.info  { color: #64748b; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo-box">✦</div>
    <div>
      <div class="app-name">OF Chatter</div>
      <div class="app-sub">AI reply assistant</div>
    </div>
  </div>

  <div class="body">

    <!-- API key -->
    <div class="field">
      <label for="apiKey">Anthropic API Key</label>
      <div id="keyStatus" class="key-pill missing">
        <div id="keyDot" class="key-dot missing"></div>
        <span id="keyStatusText">No key saved</span>
      </div>
      <input type="password" id="apiKey" placeholder="sk-ant-…" autocomplete="off">
    </div>

    <div class="sep"></div>

    <!-- Creator type -->
    <div class="field">
      <label for="creatorType">Creator type</label>
      <select id="creatorType">
        <option value="woman">Woman — warm, flirty, confident</option>
        <option value="egirl">E-girl — playful, teasing, emoji-heavy</option>
        <option value="mature_woman">Mature woman — experienced, nurturing</option>
        <option value="man">Man — direct, gym lifestyle, confident</option>
        <option value="picture_only">Picture only — photo sets, visual</option>
        <option value="video_creator">Video creator — clips, motion, custom</option>
        <option value="couple">Couple — "we" language, voyeuristic</option>
      </select>
    </div>

    <div class="sep"></div>

    <!-- Actions -->
    <div class="field">
      <div class="btn-row">
        <button id="test">Test API</button>
        <button id="save">Save</button>
      </div>
      <div id="status" style="margin-top:10px;"></div>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
